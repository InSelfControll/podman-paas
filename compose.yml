version: '3.8'

# Bootstrap compose file to run the PodPaaS management UI and API
# Run with: podman-compose up -d
#
# IMPORTANT: For rootless podman, update the socket path:
#   export PODMAN_SOCKET=/run/user/$(id -u)/podman/podman.sock
#   podman-compose up -d

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      # Podman socket - update this path for your environment
      # Rootless: /run/user/1000/podman/podman.sock (replace 1000 with your UID)
      # Rootful:  /run/podman/podman.sock
      - ${PODMAN_SOCKET:-/run/user/1000/podman/podman.sock}:/run/podman/podman.sock:ro
    environment:
      - PORT=3001
      - DATA_DIR=/app/data
      - PODMAN_SOCKET=/run/podman/podman.sock
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - NODE_ENV=${NODE_ENV:-production}
      # Compose command - podman will try docker-compose if podman-compose not installed
      - COMPOSE_CMD=podman-compose
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Ensure api starts after podman socket is available
    depends_on:
      - init

  init:
    image: busybox:latest
    command: sh -c 'echo "Waiting for podman socket..." && sleep 2'
    volumes:
      - ${PODMAN_SOCKET:-/run/user/1000/podman/podman.sock}:/run/podman/podman.sock:ro
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3001}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Enable admin API
      - CADDY_ADMIN=0.0.0.0:2019
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
